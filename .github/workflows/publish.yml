name: Publish to npm (Trusted Publisher)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - run: npm --version
      - run: npm i -g npm@latest
      - run: npm --version
      - run: npm install
      - run: npm ci

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - run: npm --version
      - run: npm i -g npm@latest
      - run: npm --version

      - run: npm install
      - run: npm ci
      - run: npm publish --provenance --access public --registry=https://registry.npmjs.org/ --loglevel=verbose
